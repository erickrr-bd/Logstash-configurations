# Logstash configuration for Nutanix v1.1 - July 2025

input {

}

filter {
        if [message] =~ /consolidated_audit/ {
                dissect {
                        mapping => {"message" => "<%{priority}>%{timestamp} %{hostname} %{app_name}: %{aux_json}"
                        }
                }
                json {
                        source => "aux_json"
                        target => "format_json"
                }
                mutate {
                        convert => {
                                "[format_json][creationTimestampUsecs]" => "integer"
                                "[format_json][opStartTimestampUsecs]" => "integer"
                                "[format_json][opEndTimestampUsecs]" => "integer"
                        }
                }
        }
        else if [message] =~ /flow_service_logs/ {
                dissect {
                        mapping => {
                                "message" => "<%{priority}>%{timestamp} %{hostname} %{app_name}: %{aux_msg}"
                        }
                }
                mutate {
                        gsub => ["aux_msg", "(\S+=)", "|\1"]
                }
                kv {
                        source => "aux_msg"
                        value_split => "="
                        field_split_pattern => "\|+"
                        trim_value => "\s"
                }
        }
        mutate{
                rename => { "[@metadata][input][tcp][source][name]" => "src_host" }
        }
        mutate{
                remove_field => ["priority", "aux_json", "message", "aux_msg"]
        }
}

output {

}