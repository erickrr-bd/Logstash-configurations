# Logstash configuration for Check Point FW-5600 v1.2 - July 2025

input {

}

filter {
        grok{
                match => {"message" => "%{NOTSPACE}\s%{NOTSPACE:date}\s%{HOSTNAME:hostname}\s%{NOTSPACE}\s%{NOTSPACE}\s\-\s\[%{GREEDYDATA:msg_aux}\]"}
        }
        if "_grokparsefailure" in [tags]{
                grok{
                        match => {"message" => "%{NOTSPACE}\s%{NOTSPACE:date}\s%{NOTSPACE}\s%{NOTSPACE}\s%{NOTSPACE}\s\-\s\[%{GREEDYDATA:msg_aux}\]"}
                }
        }
        kv{
                source => "msg_aux"
                field_split => ";"
                value_split => ":"
                remove_field => ["message", "msg_aux", "tags"]
        }
}

output {

}