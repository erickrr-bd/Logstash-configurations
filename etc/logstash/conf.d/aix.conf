# Logstash configuration for AIX v1.0 - November 2025

input {

}

filter {
        if [message] =~ /sshd\[\d+\]/{
                grok{
                        match => {
                                "message" => "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} Message forwarded from %{HOSTNAME:hostname}: sshd\[%{INT:pid}\]: %{GREEDYDATA:ssh_message}"
                        }
                }
                grok{
                        match => {
                                "ssh_message" => [
                                        "Accepted %{WORD:auth_method} for %{USERNAME:user} from %{IP:src_ip} port %{INT:port} ssh2",
                                        "Disconnected from user %{USERNAME:user} %{IP:src_ip} port %{INT:port}",
                                        "Received disconnect from %{IP:src_ip} port %{INT:port}:%{INT}: disconnected by user"
                                ]
                        }
                }
        }
        else if "Oracle Audit" in [message]{
                grok{
                        match => {
                                "message" => "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} Message forwarded from %{HOSTNAME:hostname}: Oracle Audit\[%{INT:pid}\]: LENGTH : %{QUOTEDSTRING:length} ACTION :\[%{INT}\] %{QUOTEDSTRING:action} DATABASE USER:\[%{INT}\] %{QUOTEDSTRING:database_user} PRIVILEGE :\[%{INT}\] %{QUOTEDSTRING:privilege} CLIENT USER:\[%{INT}\] %{QUOTEDSTRING:client_user} CLIENT TERMINAL:\[%{INT}\] %{QUOTEDSTRING:client_terminal} STATUS:\[%{INT}\] %{QUOTEDSTRING:status} DBID:\[%{INT}\] %{QUOTEDSTRING:db_id} SESSIONID:\[%{INT}\] %{QUOTEDSTRING:session_id} USERHOST:\[%{INT}\] %{QUOTEDSTRING:user_host} CLIENT ADDRESS:\[%{INT}\] %{QUOTEDSTRING:client_address} ACTION NUMBER:\[%{INT}\] %{QUOTEDSTRING:action_number}"
                        }
                }
        }
        else if "unix" in [message]{
                grok{
                        match => {
                                "message" => "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} Message forwarded from %{HOSTNAME:hostname}: unix: %{GREEDYDATA:unix_message}"
                        }
                }
                grok{
                        match => {
                                "unix_message" => [
                                        "The privilege command %{GREEDYDATA:priv_command}, is executed by user with id %{INT:user_id}"
                                ]
                        }
                }
        }
        else if "syslog" in [message]{
                grok{
                        match => {
                                "message" => "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} Message forwarded from %{HOSTNAME:hostname}: syslog: %{GREEDYDATA:syslog_message}"
                        }
                }
                grok{
                        match => {
                                "syslog_message" => [
                                        "ssh: failed login attempt for %{USERNAME:username} from %{IP:src_ip}"
                                ]
                        }
                }
        }
        else if "aso" in [message]{
                grok{
                        match => {
                                message => "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} Message forwarded from %{HOSTNAME:hostname}: aso\[%{INT:pid}\]: %{GREEDYDATA:aso_message}"
                        }
                }
        }
        else if "sendmail" in [message]{
                grok{
                        match => {
                                message => "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} Message forwarded from %{HOSTNAME:hostname}: sendmail\[%{INT:pid}\]: %{WORD:queue_id}: %{GREEDYDATA:sendmail_message}"
                        }
                }
                grok{
                        match => {
                                sendmail_message => [
                                        "from\=%{DATA:from}, size\=%{INT:size}, class\=%{INT:class}, nrcpts\=%{INT:nrcpts}, msgid\=%{DATA:msgid}, relay\=%{GREEDYDATA:relay}",
                                        "to\=%{DATA:to}, ctladdr\=%{DATA:ctladdr}, delay\=%{DATA:delay}, xdelay\=%{DATA:xdelay}, mailer\=%{GREEDYDATA:mailer}, pri\=%{INT:pri}, relay\=%{DATA:relay}, dsn\=%{DATA:dsn}, stat\=%{GREEDYDATA:stat}"
                                ]
                        }
                }
        }
        else if [message] =~ /src\[\d+\]/{
                grok{
                        match => {
                                "message" => "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} Message forwarded from %{HOSTNAME:hostname}: src\[%{INT:pid}\]: %{GREEDYDATA:src_message}"
                        }
                }
                grok{
                        match => {
                                src_message => [
                                        "The %{WORD:subsystem} subsystem was requested to %{WORD:action} by user %{USERNAME:username}"
                                ]
                        }
                }
        }
        mutate{
                remove_field => ["message", "tags", "sendmail_message"]
        }
}

output {

}